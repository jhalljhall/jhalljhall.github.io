# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
jhalljhall:
  name: Justin Hall
  email: jhalljhall@gmail.com

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about: |
    Born in Pikeville, KY in 1974 to J.D. Hall and Sharon Hatfield Hall, Justin grew up in the hills of eastern Kentucky. He graduated from Elkhorn City High School in 1993 and Pikeville College (now [UPike](https://www.upike.edu)) in the summer of 1997. Shortly after graduating from UPike, Hall discovered an interest in technology, specifically web related technologies and programming. In 2000, while recovering from back surgery and unemployed, Hall taught himself how to code. 
    
    For the next 14 years Hall worked with Fortune 500 companies, non-for-profit organizations, consulting firms, Ad agencies, and small to medium sized businesses throughout the United States, Canada, and Sweden. He worked with companies associated with the kitchen and bath, coal, health and wellness, and sports industries, as well as, military and government sectors. He continues to work in the field of software development. In 2017, Hall was one of [Fast Company's 100 Most Creative People in Business](https://www.fastcompany.com/person/justin-hall) for helping start [Bit Source](https://www.bitsourceky.com), a company located in eastern Kentucky that employs former coal miners as coders.

  # This photo will be used in the about section
  picture:
    path: /assets/img/jdh_bw.jpg
